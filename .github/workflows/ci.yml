# Library CI — runs the test suite on every push to main and PR.
# 45 tests across 4 files: envelope (incl. roundtrip vs a2a-acl),
# ip-rate-limit, caller-id, middleware integration.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: install
        run: npm ci --no-audit --no-fund
      - name: test
        run: node --test test/*.test.js
